<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controle de Gastos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .total {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .gasto {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .fab {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: red;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
      border: none;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    .form {
      display: none;
      background: white;
      padding: 20px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<header>Resumo</header>

<div class="container">
  <div class="total" id="total">Total: R$ 0</div>
  <div id="lista"></div>
</div>

<button class="fab" onclick="abrirForm()">+</button>

<div class="form" id="form">
  <input type="text" id="descricao" placeholder="Descrição"/>
  <input type="number" id="valor" placeholder="Valor"/>
  <button onclick="salvar()">Salvar</button>
</div>

<div class="nav">
  <div>Home</div>
  <div>Gastos</div>
  <div>Config</div>
</div>

<script>
  let gastos = JSON.parse(localStorage.getItem("gastos")) || [];

  function render() {
    const lista = document.getElementById("lista");
    const totalEl = document.getElementById("total");

    lista.innerHTML = "";

    let total = 0;

    gastos.forEach((g, index) => {
      total += Number(g.valor);

      const div = document.createElement("div");
      div.className = "gasto";
      div.innerHTML = `
        <span>${g.descricao}</span>
        <span>R$ ${g.valor}</span>
      `;

      lista.appendChild(div);
    });

    totalEl.innerText = "Total: R$ " + total;
  }

  function abrirForm() {
    document.getElementById("form").style.display = "block";
  }

  function salvar() {
    const descricao = document.getElementById("descricao").value;
    const valor = document.getElementById("valor").value;

    if (!descricao || !valor) {
      alert("Preencha tudo");
      return;
    }

    gastos.push({ descricao, valor });

    localStorage.setItem("gastos", JSON.stringify(gastos));

    document.getElementById("form").style.display = "none";
    document.getElementById("descricao").value = "";
    document.getElementById("valor").value = "";

    render();
  }

  render();
</script>

</body>
</html>
