<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance App</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #f5f6fa;
    }

    .container {
      padding: 16px;
      padding-bottom: 90px;
    }

    .hidden { display: none; }

    .fab {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #C0392B;
      color: white;
      font-size: 28px;
      border: none;
      cursor: pointer;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: white;
      border-top: 1px solid #ddd;
    }

    .nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .nav-btn.active {
      color: #C0392B;
      font-weight: bold;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
    }

    .pay-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    .pay-active {
      background: #FEF0F0;
      border-color: #C0392B;
      color: #C0392B;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="home">
    <h2>Resumo</h2>
    <p id="total"></p>
  </div>

  <div id="expenses" class="hidden">
    <h2>Gastos</h2>
    <ul id="expense-list"></ul>
  </div>

  <div id="settings" class="hidden">
    <h2>Configurações</h2>
  </div>

</div>

<button class="fab" id="fab">+</button>

<div class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" onclick="setTab('home', this)">Home</button>
  <button class="nav-btn" onclick="setTab('expenses', this)">Gastos</button>
  <button class="nav-btn" onclick="setTab('settings', this)">Config</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal-expense">
  <div class="modal-content">
    <h3>Novo Gasto</h3>

    <input type="text" id="desc" placeholder="Descrição" />
    <input type="number" id="value" placeholder="Valor" />

    <div style="display:flex; gap:8px; margin-bottom:10px;">
      <button id="pay-nomad" class="pay-btn pay-active" onclick="selectPayment('Nomad')">💳 Nomad</button>
      <button id="pay-dinheiro" class="pay-btn" onclick="selectPayment('Dinheiro')">💵 Dinheiro</button>
      <button id="pay-outro" class="pay-btn" onclick="selectPayment('Outro')">💸 Outro</button>
    </div>

    <button onclick="saveExpense()">Salvar</button>
    <button onclick="closeExpenseModal()">Cancelar</button>
  </div>
</div>

<script>
let expenses = [];
let payment = "Nomad";

function renderAll(){
  const list = document.getElementById("expense-list");
  list.innerHTML = "";

  let total = 0;

  expenses.forEach(e => {
    total += e.value;

    const li = document.createElement("li");
    li.innerText = `${e.desc} - R$ ${e.value} (${e.payment})`;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = "Total: R$ " + total;
}

function openExpenseModal(){
  document.getElementById("modal-expense").classList.add("open");
  document.getElementById("desc").value = "";
  document.getElementById("value").value = "";
  selectPayment("Nomad");
}

function closeExpenseModal(){
  document.getElementById("modal-expense").classList.remove("open");
}

function selectPayment(method){
  payment = method;

  document.querySelectorAll(".pay-btn").forEach(btn => {
    btn.classList.remove("pay-active");
  });

  if(method === "Nomad") document.getElementById("pay-nomad").classList.add("pay-active");
  if(method === "Dinheiro") document.getElementById("pay-dinheiro").classList.add("pay-active");
  if(method === "Outro") document.getElementById("pay-outro").classList.add("pay-active");
}

function saveExpense(){
  const desc = document.getElementById("desc").value;
  const value = parseFloat(document.getElementById("value").value);

  if(!desc || !value) return;

  expenses.push({ desc, value, payment });

  closeExpenseModal();
  renderAll();
}

function setTab(tab, el){
  document.querySelectorAll(".container > div").forEach(div => {
    div.classList.add("hidden");
  });

  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
}

document.getElementById("fab").addEventListener("click", openExpenseModal);

renderAll();
</script>

</body>
</html>
